name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pytest
        env:
          # Following best practice: Even dummy/mock tokens are pulled from GitHub Secrets.
          # We provide explicit fallbacks so CI passes even if secrets aren't configured yet.
          GEMINI_API_KEY: ${{ secrets.MOCK_GEMINI_API_KEY || 'mock_key_for_testing' }}
          FAN_AUTH_TOKEN: ${{ secrets.MOCK_FAN_AUTH_TOKEN || 'mock-fan-token' }}
          VOLUNTEER_AUTH_TOKEN: ${{ secrets.MOCK_VOLUNTEER_AUTH_TOKEN || 'mock-volunteer-token' }}
          STAFF_AUTH_TOKEN: ${{ secrets.MOCK_STAFF_AUTH_TOKEN || 'mock-staff-token' }}
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=85
        
      - name: Coverage Summary
        run: |
          # Extract the total coverage percentage from the coverage report
          TOTAL=$(coverage report | grep 'TOTAL' | awk '{print $NF}')
          echo "Total coverage: $TOTAL"
          
          # Print to the GitHub Actions Job Summary UI
          echo "### 🧪 Pytest Coverage: $TOTAL" >> $GITHUB_STEP_SUMMARY
