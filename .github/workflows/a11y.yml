name: Accessibility Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Axe CLI and Server
        run: npm install -g serve @axe-core/cli
        
      - name: Run Accessibility Tests
        run: |
          # Start static server
          serve -l 8000 static &
          # Wait for server to boot
          sleep 3
          # Run Axe tests and fail on serious/critical violations
          axe http://localhost:8000/index.html --exit
